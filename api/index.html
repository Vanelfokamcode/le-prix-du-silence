<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Prix du Silence — Investigation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Epilogue:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root { --transition: 0.35s cubic-bezier(0.4,0,0.2,1); }
[data-theme="dark"] {
  --bg: #080a0f; --bg-card: #0e1119; --bg-hover: #131720; --bg-glass: rgba(8,10,15,0.82);
  --border: rgba(255,255,255,0.07); --border-accent:rgba(201,160,60,0.35);
  --text: #eceef2; --text-2: #8892a4; --text-3: #404858;
  --gold: #c9a03c; --gold-soft: rgba(201,160,60,0.1); --gold-glow: rgba(201,160,60,0.3);
  --red: #e54040; --shadow: 0 4px 32px rgba(0,0,0,0.6);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Epilogue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
nav { position: fixed; top:0; left:0; right:0; z-index:100; display: flex; align-items:center; justify-content:space-between; padding: 0 40px; height: 60px; background: var(--bg-glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.nav-logo { width:32px; height:32px; background: var(--gold); border-radius: 6px; display:flex; align-items:center; justify-content:center; }
.nav-wordmark { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-left: 10px; }
.search-container { position:relative; margin-left:20px; }
#search-input { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; color: var(--text); font-family: 'DM Mono'; font-size: 12px; width: 250px; transition: 0.3s; }
#search-input:focus { width: 350px; border-color: var(--gold); outline: none; }
#search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; display: none; max-height: 300px; overflow-y: auto; }
.search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; }
.search-item:hover { background: var(--bg-hover); color: var(--gold); }
.page { max-width: 1280px; margin: 0 auto; padding: 100px 40px 80px; }
.hero { display: grid; grid-template-columns: 1fr 340px; gap: 64px; align-items: end; border-bottom: 1px solid var(--border); padding-bottom: 48px; margin-bottom: 48px; }
.hero h1 { font-family:'DM Serif Display',serif; font-size: 4rem; line-height:1.0; }
.hero h1 .accent { color:var(--gold); font-style:italic; }
.hero-figure { background: var(--bg-card); border: 1px solid var(--border-accent); border-radius:16px; padding:32px; text-align:center; }
.figure-value { font-family:'DM Serif Display',serif; font-size:3.5rem; color:var(--gold); }
.stats-strip { display:grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 48px; }
.stat-cell { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.stat-cell-value { font-family:'DM Serif Display',serif; font-size:2rem; }
.leaderboard { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); }
.lb-header { display:grid; grid-template-columns: 56px 1fr 120px 160px 200px; gap:16px; padding:12px 24px; background:var(--bg); color:var(--text-3); font-family:'DM Mono'; font-size:10px; text-transform:uppercase; }
.lb-row { display:grid; grid-template-columns: 56px 1fr 120px 160px 200px; gap:16px; padding:16px 24px; border-bottom:1px solid var(--border); align-items:center; cursor: pointer; transition: 0.2s; }
.lb-row:hover { background: var(--bg-hover); transform: translateX(5px); }
.groupe-tag { padding:4px 10px; border-radius:6px; font-family:'DM Mono'; font-size:10px; text-transform:uppercase; background: rgba(255,255,255,0.05); }
.score-num { font-family:'DM Serif Display'; font-size:1.3rem; color: var(--gold); }
.lobby-chip { padding:2px 8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; font-size:9px; margin-right:4px; color: var(--text-2); }
#modal-overlay { position:fixed; inset:0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display:none; align-items:center; justify-content:center; z-index: 1000; }
.modal-content { background: var(--bg-card); border: 1px solid var(--border-accent); width: 600px; border-radius: 20px; padding: 40px; position: relative; }
.close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-3); }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></div>
    <div class="nav-wordmark">Le Prix du <em>Silence</em></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Chercher un député..." onkeyup="handleSearch(this.value)">
        <div id="search-results"></div>
    </div>
  </div>
</nav>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">×</span>
        <h2 id="m-name" style="font-family:'DM Serif Display'; font-size: 2.5rem; color:var(--gold);">---</h2>
        <p style="color:var(--text-3); margin-bottom:20px; font-family:'DM Mono';">Top Lobbyistes concernés :</p>
        <div id="m-list"></div>
    </div>
</div>

<div class="page">
  <section class="hero">
    <h1>Qui vote pour<br>les <span class="accent">lobbys ?</span></h1>
    <div class="hero-figure"><div class="figure-value">69 544</div><div style="font-size:12px; color:var(--text-3)">fiches analysées</div></div>
  </section>

  <div class="stats-strip">
    <div class="stat-cell"><div class="stat-cell-value" id="s-deputes">—</div><div style="font-size:10px; color:var(--text-3)">DÉPUTÉS</div></div>
    <div class="stat-cell"><div class="stat-cell-value" id="s-lobbies">—</div><div style="font-size:10px; color:var(--text-3)">LOBBYISTES</div></div>
    <div class="stat-cell"><div class="stat-cell-value" id="s-connexions">—</div><div style="font-size:10px; color:var(--text-3)">VOTES</div></div>
    <div class="stat-cell"><div class="stat-cell-value" id="s-score">52.7%</div><div style="font-size:10px; color:var(--text-3)">MOYENNE</div></div>
  </div>

  <div class="leaderboard">
    <div class="lb-header"><span>#</span><span>Député</span><span>Groupe</span><span style="text-align:right">Score</span><span>Top Lobbyistes</span></div>
    <div id="lb-body"></div>
  </div>
</div>

<script>
async function loadData() {
    const [sRes, rRes] = await Promise.all([fetch('/api/stats'), fetch('/api/ranking')]);
    const stats = await sRes.json();
    const ranking = await rRes.json();
    document.getElementById('s-deputes').textContent = stats.deputes_analyses;
    document.getElementById('s-lobbies').textContent = stats.lobbyistes_hatvp;
    document.getElementById('s-connexions').textContent = stats.connexions.toLocaleString();
    document.getElementById('lb-body').innerHTML = ranking.map(r => `
      <div class="lb-row" onclick="openDepute('${r.name}')">
        <div style="font-family:'DM Serif Display'; font-size:1.2rem; color:var(--text-3)">${r.rank}</div>
        <div><div style="font-weight:700">${r.name}</div></div>
        <div><span class="groupe-tag">${r.groupe}</span></div>
        <div class="score-num" style="text-align:right">${r.score}%</div>
        <div>${r.lobbyistes.map(l => `<span class="lobby-chip">${l}</span>`).join('')}</div>
      </div>`).join('');
}

async function handleSearch(val) {
    const resDiv = document.getElementById('search-results');
    if(val.length < 2) { resDiv.style.display = 'none'; return; }
    const res = await fetch(`/api/search?q=${val}`);
    const results = await res.json();
    resDiv.innerHTML = results.map(d => `<div class="search-item" onclick="openDepute('${d.name}')">${d.name} (${d.groupe})</div>`).join('');
    resDiv.style.display = 'block';
}

async function openDepute(name) {
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('modal-overlay').style.display = 'flex';
    document.getElementById('m-name').innerText = name;
    const res = await fetch(`/api/depute/${name}`);
    const details = await res.json();
    document.getElementById('m-list').innerHTML = details.map(l => `
        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);">
            <div style="font-size:14px; font-weight:600;">${l.lobbyist}</div>
            <div style="font-family:'DM Mono'; color:var(--gold);">${l.strength} votes</div>
        </div>`).join('');
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
loadData();
</script>
</body>
</html>
